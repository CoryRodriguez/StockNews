events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;

  # Rate limiting for API
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  upstream backend {
    server backend:3001;
  }

  upstream frontend {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    # ── Security headers ────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide server version
    server_tokens off;

    # Prevent large request bodies (DoS protection)
    client_max_body_size 2m;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect HTTP → HTTPS once cert is set up
    # Comment out the redirect and use the block below during initial setup
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://backend/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Stricter rate limit for auth endpoints
    location /api/auth/ {
      limit_req zone=api burst=5 nodelay;
      proxy_pass http://backend/api/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket upgrade
    location /ws {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # Block access to sensitive files
    location ~ /\. { deny all; }
  }

  # HTTPS server — uncomment after running certbot
  # server {
  #   listen 443 ssl;
  #   server_name yourdomain.com;
  #
  #   ssl_certificate     /etc/nginx/certs/live/yourdomain.com/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/live/yourdomain.com/privkey.pem;
  #
  #   location / {
  #     proxy_pass http://frontend;
  #     proxy_set_header Host $host;
  #   }
  #
  #   location /api/ {
  #     proxy_pass http://backend;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #   }
  #
  #   location /ws {
  #     proxy_pass http://backend;
  #     proxy_http_version 1.1;
  #     proxy_set_header Upgrade $http_upgrade;
  #     proxy_set_header Connection "upgrade";
  #     proxy_read_timeout 86400s;
  #   }
  # }
}
